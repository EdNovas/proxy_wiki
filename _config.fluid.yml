# Fluid Theme Configuration
# Docs: https://hexo.fluid-dev.com/docs/

#---------------------------
# 全局
#---------------------------

favicon: /images/favicon.ico

apple_touch_icon: /images/favicon.ico

dark_mode:
  enable: true
  default: auto

color:
  body_bg_color: "#eef0f4"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  navbar_color: "#fff"
  navbar_color_dark: "#d0d4e0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d4e0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6cf"
  sec_text_color: "#718096"
  sec_text_color_dark: "#a7a9ad"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6cf"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#c4c6cf"
  post_link_color: "#0366d6"
  post_link_color_dark: "#1589e9"
  link_hover_color: "#30a9de"
  link_hover_color_dark: "#30a9de"

font:
  font_size: 16px
  font_family:
  letter_spacing: 0.02em
  code_font_size: 85%

custom_css:
  - /css/custom.css

custom_js:
  - /js/sponsor-inject.js

custom_html: ''

web_analytics:
  enable: false

lazyload:
  enable: true
  loading_img: /images/loading.gif
  onlypost: false
  offset_factor: 2

#---------------------------
# 头部
#---------------------------

navbar:
  blog_title: Proxy Wiki
  ground_glass:
    enable: true
    px: 3
    alpha: 0.7
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }
    - { key: "links", link: "/links/", icon: "iconfont icon-link-fill" }

#---------------------------
# 首页
#---------------------------

index:
  banner_img: https://api.ednovas.xyz
  banner_img_height: 60
  banner_mask_alpha: 0.3
  post_default_img: ''
  slogan:
    enable: true
    text: 从零基础入门到深度技术解析
    api:
      enable: false
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true

#---------------------------
# 文章页
#---------------------------

post:
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3
  default_index_img: /images/default-post.jpg
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "YYYY-MM-DD"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 300
    views:
      enable: false
  updated:
    enable: true
    date_format: "YYYY-MM-DD"
    relative: false
    note: ""
  toc:
    enable: true
    placement: right
    headingSelector: "h2,h3,h4"
    collapseDepth: 3
  copyright:
    enable: true
    content: '本文由 <a href="https://ednovas.me" target="_blank">ednovas</a> 维护，采用 <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> 协议发布。'
  prev_next:
    enable: true
  image_zoom:
    enable: true
  footnote:
    enable: true
  math:
    enable: false
  mermaid:
    enable: true
    specific: true
    options:
  comments:
    enable: false

#---------------------------
# 归档页
#---------------------------

archive:
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3

#---------------------------
# 分类页
#---------------------------

category:
  enable: true
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3
  order_by: "-length"
  collapse_depth: 0
  post_order_by: "-date"
  post_limit: 10

#---------------------------
# 标签页
#---------------------------

tag:
  enable: true
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3
  tagcloud:
    min_font: 15
    max_font: 30
    unit: px
    start_color: "#aaa"
    end_color: "#111"

#---------------------------
# 关于页
#---------------------------

about:
  enable: true
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3
  avatar: /images/avatar.png
  name: "Proxy Wiki"
  intro: "一份面向中文用户的代理技术参考手册"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/EdNovas/proxy-wiki", tip: "GitHub" }
    - { class: "iconfont icon-link-fill", link: "https://ednovas.xyz", tip: "Blog" }

#---------------------------
# 友链页
#---------------------------

links:
  enable: true
  banner_img: https://api.ednovas.xyz
  banner_img_height: 40
  banner_mask_alpha: 0.3
  items:
    - {
        title: "ednovas Blog",
        intro: "技术分析与教程",
        link: "https://ednovas.xyz",
        avatar: "/images/avatar.png"
      }
    - {
        title: "ednovas 云",
        intro: "高质量国内中转代理服务",
        link: "https://ednovas.me",
        avatar: "/images/avatar.png"
      }
    - {
        title: "TransLink",
        intro: "高质量海外中转代理服务",
        link: "https://translink.cc",
        avatar: "/images/avatar.png"
      }

#---------------------------
# 页脚
#---------------------------

footer:
  content: '
    <div>
      由 <a href="https://ednovas.xyz" target="_blank">ednovas</a> 维护
      | <a href="https://ednovas.me" target="_blank">ednovas云</a>代理服务
      | <a href="https://translink.cc" target="_blank">TransLink</a> 代理服务 支持
    </div>
    <div>
      <a href="https://hexo.io" target="_blank" rel="nofollow noopener">Hexo</a>
      <i class="iconfont icon-love"></i>
      <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener">Fluid</a>
    </div>
  '
  statistics:
    enable: false
