name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '**.txt'

  # 允许手动触发部署
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 新推送自动取消正在进行的部署，避免排队堆积
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Hexo 需要完整 git 历史来生成文章日期

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Hexo
        run: npx hexo generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
          retention-days: 1  # artifact 只保留 1 天，防止存储堆积

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 自动清理旧的 workflow 运行记录和 artifact，防止存储膨胀
  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5
