# Vivia Theme Configuration
# Docs: https://github.com/saicaca/hexo-theme-vivia

# 导航栏
menu:
  Home: /
  Archives: /archives
  Categories: /categories
  Tags: /tags
  Links: /links
  About: /about
rss: /atom.xml

home:
  style: default           # default, detail

favicon: /images/favicon.ico

# 横幅图片
banner:
  enable: true
  url: https://api.ednovas.xyz
  position: center
  onAllPages: true

# 外观
hue: 260                   # 蓝色调

# 个人信息
avatar: https://cdn.jsdelivr.net/gh/wdm1732418365/CDN/New%20folder/icon.png
author: 代理百科
subtitle: 协议 · 工具 · 入门 · 实践 —— 一站式代理技术博客
links:
  - name: GitHub
    icon: fa-brands fa-github
    url: https://github.com/EdNovas/proxy-wiki
  - name: Blog
    icon: fa-solid fa-link
    url: https://ednovas.xyz
  - name: RSS
    icon: fa-solid fa-rss
    url: /atom.xml

# 侧边栏
sidebar:
  widgets:
    normal:
      - profile
    sticky:
      - category
      - tag
      - recent_posts

# 侧边栏组件设置
archive_type: 'monthly'
recent_posts_limits: 5
categories:
  max_depth: 2

# 第三方评论系统
comment:
  valine:
    enable: false
  twikoo:
    enable: false
  waline:
    enable: false

# Analytics
gauges_analytics: false
google_analytics: false
baidu_analytics: false
